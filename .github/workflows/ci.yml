name: ci

on:
  push:
    branches: [main]
  # Run CI on every pull_request — including stacked PRs whose base
  # is a feature branch, not main. Restricting to `branches: [main]`
  # would skip CI on intermediate stacked slices and hide regressions
  # until final merge.
  pull_request:

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Must match .node-version and Whatbox production runtime (WEEK0_LOG.md Req I)
          node-version-file: .node-version
          cache: npm

      - run: node --version
      - run: npm --version

      - name: Install
        run: npm ci

      - name: Typecheck (source + test)
        run: npm run typecheck

      - name: Test
        run: npm test
