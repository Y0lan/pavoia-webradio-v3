name: ci

on:
  push:
    branches: [main]
  # Run CI on every pull_request — including stacked PRs whose base
  # is a feature branch, not main. Restricting to `branches: [main]`
  # would skip CI on intermediate stacked slices and hide regressions
  # until final merge.
  pull_request:

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Must match .node-version and Whatbox production runtime (WEEK0_LOG.md Req I)
          node-version-file: .node-version
          cache: npm

      - run: node --version
      - run: npm --version

      # ffmpeg drives the stage supervisor's integration tests
      # (apps/engine/src/stages/integration.test.ts). The unit tests
      # cover argv shape + lifecycle against mocks; the integration
      # tests exist to catch invalid flag combos or segment-output
      # regressions that only show up under a real ffmpeg.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - run: ffmpeg -version | head -1

      - name: Install
        run: npm ci

      - name: Typecheck (source + test)
        run: npm run typecheck

      - name: Test
        run: npm test
